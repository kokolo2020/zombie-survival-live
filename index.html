<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZAttack Live v3</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div><h1>🧟 ZAttack Live</h1><p>Interactive YouTube Livestream Zombie Survival Game</p></div>
      <div class="stats">
        <div><span>Wave</span><strong id="wave">1</strong></div>
        <div><span>Zombies</span><strong id="zombieCount">10</strong></div>
        <div><span>Base HP</span><strong id="baseHp">100</strong></div>
      </div>
    </header>

    <main class="layout">
      <section class="game-wrap">
        <div id="game"></div>
        <div class="banner" id="banner">Waiting for reinforcements...</div>
      </section>

      <aside class="panel">
        <section class="card control-card">
          <h2>🎮 Player Control</h2>
          <input id="playerName" placeholder="Enter your name once" maxlength="18"/>
          <button class="join" data-command="join">📢 Reinforcement Join</button>

          <div class="class-row">
            <button data-class="soldier">🪖 Soldier</button>
            <button data-class="medic">❤️ Medic</button>
            <button data-class="engineer">🔨 Engineer</button>
            <button data-class="sniper">🎯 Sniper</button>
          </div>

          <div class="button-grid">
            <button data-command="fight">⚔️ Fight</button>
            <button data-command="heal">❤️ Heal</button>
            <button data-command="search">🎒 Search</button>
            <button data-command="build">🔨 Build</button>
            <button data-command="run">🏃 Run</button>
            <button data-command="boost">⚡ Boost</button>
          </div>
        </section>

        <section class="card"><h2>🏆 Leaderboard</h2><ol id="leaderboard"></ol></section>
        <section class="card"><h2>📢 Live Events</h2><div class="log" id="log"></div></section>
      </aside>
    </main>
  </div>
  <script src="game.js"></script>
</body>
</html>
